# Test classes run concurrently on a work-stealing pool sized to CPU cores;
# methods inside one class stay on a single thread so per-class lifecycle
# (@BeforeEach/@AfterEach) never interleaves.
#
# Safe because tests do not mutate JVM-global state: global dependencies are
# injected via HookEnv (core/HookEnv.kt) and tests pass fakes (TestEnvs.kt).
# Legacy tests that still swap globals carry @Isolated until migrated;
# scripts/check-global-state.sh keeps new offenders out.
# The IntelliJ platform test framework auto-registers global extensions
# (UncaughtExceptionExtension, ThreadLeakTracker, ...) via service-loader
# auto-detection. UncaughtExceptionExtension swaps the JVM-wide default
# uncaught-exception handler around EVERY test — a save/swap/restore on
# process-global state that races under parallel execution (thread A restores
# null, thread B's afterEach casts null -> NPE). These extensions target
# full-IDE integration tests; this suite is plain unit tests, so keep them out.
#
# NOTE: "enabled=false" is defence in depth only. testFramework.jar ships
# JUnit5TestEnvironmentInitializer, a LauncherSessionListener that JUnit loads
# unconditionally via ServiceLoader (session listeners ignore the
# autodetection flag) and that force-resets enabled to "true" from inside the
# JVM at session start — later than any Gradle-side write. The line that
# actually holds is the exclude filter (JUnit 5.12+): it is applied at
# extension registration time and is out of that listener's reach. Both are
# also set as system properties in build.gradle.kts (which take precedence
# over this file) and asserted by JUnitConfigurationGateTest.
junit.jupiter.extensions.autodetection.enabled=false
junit.jupiter.extensions.autodetection.exclude=com.intellij.*

# Safety net: no single test may run longer than 2 minutes (normal tests here
# finish in milliseconds). A hang thus becomes a FAILED test carrying the stuck
# thread's stack trace instead of an endlessly waiting build - which both
# unblocks CI and pinpoints the blocking line for diagnosis.
junit.jupiter.execution.timeout.default = 2m

junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent
junit.jupiter.execution.parallel.config.strategy=dynamic
junit.jupiter.execution.parallel.config.dynamic.factor=1.0
