<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Main branch line -->
  <line x1="5" y1="4" x2="5" y2="13" stroke="#6C6C6C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Merge curve from right node into main branch -->
  <path fill="none" stroke="#6C6C6C" stroke-width="1.5" stroke-linecap="round" d="M11 5C11 8 7 9 5 10"/>
  <!-- Top node (main branch) -->
  <circle cx="5" cy="3.5" r="1.75" fill="#6C6C6C"/>
  <!-- Bottom node (main branch) -->
  <circle cx="5" cy="13" r="1.75" fill="#6C6C6C"/>
  <!-- Right node (feature branch) -->
  <circle cx="11" cy="3.5" r="1.75" fill="#6C6C6C"/>
</svg>
