# OpenSSF Scorecard analysis.
#
# Runs the OpenSSF Scorecard checks weekly and on pushes to main, then
# publishes results to:
#   - the project's Code Scanning alerts page (SARIF upload)
#   - the public Scorecard API (https://api.scorecard.dev/)
# The README badge surfaces the score so adopters can see it without
# having to visit the API directly.
#
# Required repository configuration:
#   - "Code scanning" must be enabled under Settings › Code security
#     for the SARIF upload step to succeed.

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '37 7 * * 2'  # Weekly, Tuesday 07:37 UTC (off-hours)
  push:
    branches: [main]

# Top-level default kept narrow (contents: read) for consistency with the
# rest of this repo's workflows. The Scorecard job below explicitly lists
# every permission it needs — anything missing here would fail the run
# immediately, which is the desired least-privilege failure mode.

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write   # upload SARIF to Code Scanning
      id-token: write          # publish results to the public Scorecard API
      contents: read           # checkout
      actions: read            # read workflow data for analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact (SARIF)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to Code Scanning
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: results.sarif
