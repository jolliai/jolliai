# Required by branch ruleset (context: build-intellij). See
# build-vscode.yaml for the step-level skip rationale.
name: CI - IntelliJ

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

permissions:
  contents: read

jobs:
  build-intellij:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intellij

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - id: changes
        uses: ./.github/actions/detect-relevant-paths
        with:
          globs: |
            intellij/*
            .github/workflows/build-intellij.yaml

      - if: steps.changes.outputs.relevant == 'true'
        name: Set up JDK 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: 21

      - if: steps.changes.outputs.relevant == 'true'
        name: Setup Gradle
        uses: gradle/actions/setup-gradle@42ebad84b0585498c0413b0967cf4e80ec0e1d19 # v4.4.1

      - if: steps.changes.outputs.relevant == 'true'
        name: Build plugin
        run: ./gradlew buildPlugin

      - if: steps.changes.outputs.relevant == 'true'
        name: Run tests
        run: ./gradlew test

      - if: steps.changes.outputs.relevant == 'true'
        name: Run Plugin Verifier
        run: ./gradlew verifyPlugin

      - if: steps.changes.outputs.relevant == 'true'
        name: Upload plugin artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: jollimemory-intellij
          path: intellij/build/distributions/*.zip
