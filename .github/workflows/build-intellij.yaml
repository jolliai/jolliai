# Required by branch ruleset (context: build-intellij). See
# build-vscode.yaml for the step-level skip rationale.
name: CI - IntelliJ

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

jobs:
  build-intellij:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intellij

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        uses: ./.github/actions/detect-relevant-paths
        with:
          globs: |
            intellij/*
            .github/workflows/build-intellij.yaml

      - if: steps.changes.outputs.relevant == 'true'
        name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - if: steps.changes.outputs.relevant == 'true'
        name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - if: steps.changes.outputs.relevant == 'true'
        name: Build plugin
        run: ./gradlew buildPlugin

      - if: steps.changes.outputs.relevant == 'true'
        name: Run tests
        run: ./gradlew test

      - if: steps.changes.outputs.relevant == 'true'
        name: Run Plugin Verifier
        run: ./gradlew verifyPlugin

      - if: steps.changes.outputs.relevant == 'true'
        name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: jollimemory-intellij
          path: intellij/build/distributions/*.zip
