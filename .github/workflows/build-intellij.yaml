# Required by branch ruleset (context: build-intellij). See
# build-vscode.yaml for the step-level skip rationale.
name: CI - IntelliJ

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

permissions:
  contents: read

jobs:
  build-intellij:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: intellij

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: changes
        uses: ./.github/actions/detect-relevant-paths
        with:
          globs: |
            intellij/*
            .github/workflows/build-intellij.yaml

      - if: steps.changes.outputs.relevant == 'true'
        name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      # `validate-wrappers: true` (default since v3) re-checksums
      # `intellij/gradle/wrapper/gradle-wrapper.jar` against Gradle's published
      # known-good list before any `./gradlew` invocation, closing the in-tree
      # binary supply-chain vector flagged by REUSE.toml's wrapper override.
      - if: steps.changes.outputs.relevant == 'true'
        name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          validate-wrappers: true

      - if: steps.changes.outputs.relevant == 'true'
        name: Build plugin
        run: ./gradlew buildPlugin

      - if: steps.changes.outputs.relevant == 'true'
        name: Run tests
        run: ./gradlew test

      - if: steps.changes.outputs.relevant == 'true'
        name: Run Plugin Verifier
        run: ./gradlew verifyPlugin

      - if: steps.changes.outputs.relevant == 'true'
        name: Upload plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jollimemory-intellij
          path: intellij/build/distributions/*.zip
