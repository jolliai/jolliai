# JolliMemory VS Code Extension Release Workflow
#
# Release flow:
#   1. Bump version in vscode/package.json (and lock file) alongside code changes, merge to main
#   2. On release branch: git fetch origin main && git rebase origin/main (keep in sync with main)
#   3. Trigger this workflow manually from release (Actions → Run workflow)
#      → Validates branch, builds, publishes to VS Code Marketplace + Open VSX, tags release-vscode-v<version>
#   - The `Production` GitHub Environment provides a manual approval gate.

name: Publish VS Code Extension to Marketplace

on:
    workflow_dispatch:

jobs:
    release-jollimemory:
        permissions:
            contents: write
        runs-on: ubuntu-24.04
        environment: Production
        concurrency:
            group: release-vscode
            cancel-in-progress: false

        steps:
            -   uses: actions/checkout@v5
                with:
                    fetch-depth: 0

            -   name: Ensure workflow runs from release branch
                run: |
                    if [ "${GITHUB_REF_NAME}" != "release" ]; then
                        echo "::error::Run this workflow from the release branch (current: ${GITHUB_REF_NAME})."
                        exit 1
                    fi

            -   name: Ensure release branch contains latest main
                run: |
                    git fetch origin main
                    if ! git merge-base --is-ancestor origin/main HEAD; then
                        echo "::error::release is behind main. Rebase/merge main into release before releasing."
                        exit 1
                    fi

            -   name: Ensure release branch is fully in sync with main
                run: |
                    # After a correct rebase, release should be identical to main.
                    EXTRA_FILES="$(git diff --name-only origin/main...HEAD || true)"

                    if [ -n "${EXTRA_FILES}" ]; then
                        echo "::error::release has commits beyond main. Rebase onto main first so the branches are identical."
                        echo "Files diverging from main:"
                        echo "${EXTRA_FILES}"
                        exit 1
                    fi

            -   uses: actions/setup-node@v5
                with:
                    node-version-file: .nvmrc

            -   name: Install workspace dependencies
                run: npm ci

            -   name: Build, lint, and test (CLI + VS Code)
                run: npm run all

            -   name: Read version from package.json
                id: version
                working-directory: vscode
                run: |
                    VERSION="$(node -p "require('./package.json').version")"
                    echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            -   name: Package extension
                working-directory: vscode
                run: npm run package

            -   name: Publish to VS Code Marketplace
                working-directory: vscode
                env:
                    VSCE_PAT: ${{ secrets.JOLLIMEMORY_VSCE_PAT }}
                run: npx vsce publish --packagePath "jollimemory-vscode-${{ steps.version.outputs.version }}.vsix" --no-dependencies --allow-missing-repository

            -   name: Publish to Open VSX (Cursor marketplace)
                working-directory: vscode
                env:
                    OVSX_PAT: ${{ secrets.JOLLIMEMORY_OVSX_PAT }}
                run: npx ovsx publish "jollimemory-vscode-${{ steps.version.outputs.version }}.vsix" -p "${OVSX_PAT}"

            -   name: Tag release
                env:
                    VERSION: ${{ steps.version.outputs.version }}
                run: |
                    git tag "release-vscode-v${VERSION}"
                    git push origin "release-vscode-v${VERSION}"
